name: Build Mineradio

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── Windows ──────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Windows NSIS installer
        run: npm run build:win
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mineradio-Windows-x64
          path: dist/Mineradio-*-Setup.exe

  # ── macOS x64 ────────────────────────────────────────────
  build-macos-x64:
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build macOS x64
        run: npx electron-builder --mac dmg zip --x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mineradio-macOS-x64
          path: |
            dist/Mineradio-*-macOS-x64.dmg
            dist/Mineradio-*-macOS-x64.zip

  # ── macOS arm64 ──────────────────────────────────────────
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build macOS arm64
        run: npx electron-builder --mac dmg zip --arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mineradio-macOS-arm64
          path: |
            dist/Mineradio-*-macOS-arm64.dmg
            dist/Mineradio-*-macOS-arm64.zip

  # ── GitHub Release ──────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos-x64, build-macos-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**
          draft: true
          generate_release_notes: true
